{% extends './base.html' %}
{% block content %}
{% load static %}
<link rel="stylesheet" href="{% static 'css/profil.css' %}">

<section class="page">
    <h2>Личный кабинет</h2>

    <div class="profile-card">
        <div class="avatar" aria-hidden="true"></div>

        <div class="profile-info">
            <p><strong>Имя:</strong> {{ request.user.username }}</p>
            <p><strong>Email:</strong> {{ request.user.email }}</p>
        </div>

        <div class="profile-actions">
            <a href="#" class="btn">Мои заказы</a>
            <a href="#" class="btn">Редактировать</a>
            <a href="" class="btn danger">Выйти</a>
        </div>
    </div>
</section>
{% endblock %}
